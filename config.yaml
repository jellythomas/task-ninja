server:
  host: "127.0.0.1"
  port: 8420

orchestrator:
  max_parallel: 2
  poll_interval: 5
  worker_timeout: 1800  # 30 min, 0 = unlimited

claude:
  command: "claude"
  flags: ["--print"]
  execute_command: "/execute-jira-task"
  pr_command: "/open-pr --draft"

mcp:
  # The orchestrator connects to mcp-atlassian-with-bitbucket as an MCP client
  # It reads the server config from Claude Code settings automatically
  atlassian_server: "mcp-atlassian-with-bitbucket"
  # Jira status mapping: board state -> Jira transition name
  jira_status_mapping:
    planning: "In Progress"
    developing: "In Progress"
    review: "In Review"
    done: "Done"

git:
  worktree_dir: ".worktrees"
  branch_prefix: "feat"
  cleanup_worktrees: true

database:
  path: "autonomous_task.db"
